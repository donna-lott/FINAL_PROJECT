<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic HTML Page</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <!-- Custom CSS for the map container -->
  <style>
    #map { height: 400px; width: 100%; }
  </style>
</head>
<body>
  <h1>Today, we are creating the digital future of Georgian Language!!</h1>
  <p>Wish me luck!</p>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Initialize the map centered on Tbilisi, Georgia -->
  <script>
    var map = L.map('map').setView([41.7151, 44.8271], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Add a marker for Tbilisi
    var marker = L.marker([41.7151, 44.8271]).addTo(map);
    marker.bindPopup("<b>Tbilisi, Georgia</b>").openPopup();
  </script>
</body>
</html>
