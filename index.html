<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Georgian Language Translator</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <!-- Custom CSS for tabs and map -->
  <style>
    #map { height: 400px; width: 100%; }
    .tab-button {
      padding: 10px 20px;
      cursor: pointer;
      margin-right: 5px;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .tab-button.active {
      background-color: #d0d0d0;
    }
    .tab-content {
      padding: 20px;
      border: 1px solid #ccc;
      margin-top: 10px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Today, we are creating the digital future of Georgian Language!!</h1>
  <p>Wish me luck!</p>

  <!-- Tab buttons -->
  <div>
    <button class="tab-button active" onclick="openTab('home')">Home</button>
    <button class="tab-button" onclick="openTab('translator')">Translator</button>
  </div>

  <!-- Home tab (default) -->
  <div id="home" class="tab-content active">
    <p>Welcome to the Georgian Language Translator project.</p>
    <!-- Map container -->
    <div id="map"></div>
  </div>

  <!-- Translator tab -->
  <div id="translator" class="tab-content">
    <h2>Translator</h2>
    <p>Type each letter as it sounds. Omit silent letters (e.g., type "J-o-h-n" for "John").</p>
    <input type="text" id="name-input" placeholder="Enter name phonetically">
    <button id="translate-button">Translate</button>
    <p id="translated-name"></p>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Initialize the map centered on Tbilisi, Georgia -->
  <script>
    var map = L.map('map').setView([41.7151, 44.8271], 13);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
    // Add a marker for Tbilisi
    var marker = L.marker([41.7151, 44.8271]).addTo(map);
    marker.bindPopup("<b>Tbilisi, Georgia</b>").openPopup();
  </script>

  <!-- Tab functionality -->
  <script>
    function openTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      document.querySelectorAll('.tab-button').forEach(button => {
        button.classList.remove('active');
      });
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }
  </script>

  <!-- Translator logic -->
   <script src="js/script.js"></script>
   <script src="js/translate.js"></script>
</body>
</html>
